name: Update artifacts

# Open a PR repinning `Artifacts.toml` whenever a new eunoia release ships its
# capi binaries. Driven cross-repo by jolars/eunoia's `julia-artifacts` workflow
# (a `repository_dispatch` sent once the per-platform tarballs are attached to
# the release), or run manually with a tag.

on:
  repository_dispatch:
    types: [eunoia-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "eunoia release tag, e.g. v1.4.0"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.event.client_payload.tag }}"
          if [ -z "$tag" ]; then
            echo "::error::no tag supplied (workflow_dispatch input or client_payload.tag)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Regenerate Artifacts.toml
        run: |
          julia -e 'import Pkg; Pkg.add("ArtifactUtils")'
          julia --project=. gen/generate_artifacts.jl "${{ steps.tag.outputs.tag }}"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          # A PAT / GitHub App token, NOT the default GITHUB_TOKEN, so the opened
          # PR triggers CI.yml. Fine-grained PAT on this repo with
          # Contents: write + Pull requests: write. Stored as ARTIFACTS_PR_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN }}
          base: main
          branch: chore/artifacts-${{ steps.tag.outputs.tag }}
          commit-message: "chore: update eunoia artifacts to ${{ steps.tag.outputs.tag }}"
          title: "chore: update eunoia artifacts to ${{ steps.tag.outputs.tag }}"
          labels: dependencies
          body: |
            Automated update of `Artifacts.toml` to eunoia
            [${{ steps.tag.outputs.tag }}](https://github.com/jolars/eunoia/releases/tag/${{ steps.tag.outputs.tag }}),
            regenerated by `gen/generate_artifacts.jl`.

            Triggered by a new release in jolars/eunoia. Review the diff, bump
            `version` in `Project.toml` if the ABI or behavior changed, then merge.
